<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Test Experiment</title>
    <style>
        body { 
            background: #2A3848; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
        }
        #status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
        #box-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }
        .box {
            width: 60px;
            height: 60px;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            /* Simulujeme sťahovanie cez sieťové obrázky */
            background-size: cover;
        }
    </style>
</head>
<body>

    <h2>Test Rýchlosti Načítania</h2>
    <div id="status">Režim: <b>Čakám na dáta...</b></div>

    <div id="box-container">
        </div>

    <script>
        const container = document.getElementById('box-container');
        const status = document.getElementById('status');
        
        // Funkcia na simuláciu sťahovania prvkov
        function generateBoxes() {
            // Použijeme náhodné obrázky z internetu, aby sme videli sťahovanie
            for (let i = 1; i <= 50; i++) {
                const box = document.createElement('div');
                box.className = 'box';
                // Každý štvorec je unikátny obrázok (vynúti sťahovanie z netu)
                box.style.backgroundImage = `url('https://picsum.photos/100/100?random=${i}')`;
                box.innerText = i;
                container.appendChild(box);
            }
            status.innerHTML = 'Režim: <b>VŠETKO NAČÍTANÉ</b>';
        }

        // Spustíme generovanie
        generateBoxes();

        // Registrácia Service Workera (iba ak ho tam potom pridáš)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Worker je pripravený!');
            });
        }
    </script>
</body>
</html>
